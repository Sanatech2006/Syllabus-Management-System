{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}Syllabus Dashboard{% endblock %}</title>

        <link rel="stylesheet" href="{% static 'assets/css/menus.css' %}" />
        <link
            rel="stylesheet"
            href="{% static 'assets/css/cou_manage.css' %}"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        {% block extra_css %}{% endblock %}
        <link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet">
    </head>
    <body class="bg-gray-100">
        <div class="flex h-screen overflow-hidden">
            <!-- Sidebar include -->
            {% include "menus.html" %}

            <!-- Main content (scrolls independently) -->
            <main class="flex-1 overflow-y-auto bg-gray-100 p-10">
                {% if messages %}
                <div class="mb-4 space-y-2">
                    {% for message in messages %}
                    <div
                        class="p-4 rounded-lg text-sm shadow {% if message.tags == 'success' %}bg-green-100 text-green-800 {% elif message.tags == 'error' %}bg-red-100 text-red-800 {% else %}bg-blue-100 text-blue-800{% endif %}"
                    >
                        {{ message }}
                    </div>
                    {% endfor %}
                </div>
                {% endif %} {% block content %}{% endblock %}
            </main>
        </div>

        <!-- JavaScript for login dropdown (can also be moved to a separate file) -->
        <script>
            function toggleLoginMenu() {
                const submenu = document.getElementById("login-submenu");
                const arrow = document.getElementById("login-arrow");
                submenu.classList.toggle("hidden");
                arrow.classList.toggle("rotate-180");
            }
        </script>
    </body>
</html>
