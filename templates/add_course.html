{% extends "base_layout.html" %}
{% load static %}
{% block title %}Add Courses{% endblock %}
{% block content %}

<div class="min-h-screen">

    <!-- Page Header with Breadcrumb -->
    <div class="mx-auto mb-8">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
                    <span class="bg-blue-600 text-white p-3 rounded-xl shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                    </span>
                    Add New Course
                </h1>
                <nav class="flex mt-2 text-sm text-gray-500">
                    <a href="#" class="hover:text-blue-600 transition">Dashboard</a>
                    <span class="mx-2">/</span>
                    <a href="{% url 'upload_center:upload_center' %}" class="hover:text-blue-600 transition">Upload Center</a>
                    <span class="mx-2">/</span>
                    <span class="text-gray-700 font-medium">Add Course</span>
                </nav>
            </div>
            <a href="{% url 'upload_center:upload_center' %}" class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Upload Center
            </a>
        </div>
    </div>

    <!-- Form Card -->
    <div class="mx-auto">
        <div class="bg-white rounded-2xl border border-gray-200 shadow-xl overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 bg-gray-50">
                <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Course Details
                </h2>
            </div>
            <div class="p-6">
                <form method="post">
                    {% csrf_token %}

                    <!-- 3‑column grid for all inputs -->
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <!-- Programme Code -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Programme Code : </label>
                            <input type="text" name="prog_code" value="{{ prog_code|default:'' }}"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Branch -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Branch : </label>
                            <input type="text" name="branch" value="{{ branch|default:'' }}"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Year of syllabus -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Year of syllabus : </label>
                            <input type="text" name="year" value="{{ year|default:'' }}"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Programme Type -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Programme Type : </label>
                            <input type="text" name="prog_type" value="{{ prog_type|default:'' }}"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Programme Category -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Programme Category : </label>
                            <select name="prog_category"
                                    class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="" {% if not prog_category %}selected{% endif %}>Select category</option>
                                <option value="arts" {% if prog_category == "arts" %}selected{% endif %}>Arts</option>
                                <option value="science" {% if prog_category == "science" %}selected{% endif %}>Science</option>
                            </select>
                        </div>
                        <!-- Semester -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Semester : </label>
                            <input type="text" name="sem" value="{{ sem|default:'' }}"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Course Code -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Course Code : </label>
                            <input type="text" name="course_code"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Part -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Part : </label>
                            <input type="text" name="part"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Course Category -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Course Category : </label>
                            <input type="text" name="course_category"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Course Title -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Course Title : </label>
                            <input type="text" name="course_title"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Hrs / Week -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Hrs / Week : </label>
                            <input type="number" name="hrs_per_week"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Credit -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Credit : </label>
                            <input type="number" name="credit"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- CIA Marks -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">CIA Marks : </label>
                            <input type="number" name="marks_cia"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- ESE Marks -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">ESE Marks : </label>
                            <input type="number" name="marks_ese"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <!-- Total Marks -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Total Marks : </label>
                            <input type="number" name="total_marks"
                                   class="w-full p-2 border border-gray-300 mt-2 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="mt-8 flex justify-end gap-3">
                        <button type="submit" name="add_next" class="px-5 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition">
                            + Add Next Course
                        </button>
                        <button type="submit" name="add_finish" class="px-5 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition shadow-md">
                            Save & Confirm
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
